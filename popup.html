<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 200px;
            background: #1a1a1a;
            color: #ff4444;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            text-align: center;
        }
        h2 { font-size: 1.2rem; margin-bottom: 20px; text-shadow: 0 0 5px #ff0000; }
        .toggle-btn {
            background: none;
            border: 2px solid #ff4444;
            color: #ff4444;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .toggle-btn:hover {
            background: #ff4444;
            color: #fff;
            box-shadow: 0 0 15px #ff4444;
        }
        .status { margin-top: 10px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <h2>TOXIC WEB v1.0</h2>
    <button id="activate" class="toggle-btn">АКТИВИРОВАТЬ</button>
    <div class="status" id="status">Статус: Спит</div>
    
    <script src="popup.js"></script>
</body>
</html>
